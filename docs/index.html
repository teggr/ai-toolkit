<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ai-toolkit</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --badge-agent: #1f6feb;
      --badge-skill: #388bfd;
      --badge-prompt: #3fb950;
      --badge-instruction: #d29922;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    header svg { flex-shrink: 0; }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
    }

    .header-subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-left: auto;
    }

    /* ── Layout ──────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: calc(100vh - 57px);
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    aside {
      border-right: 1px solid var(--border);
      padding: 16px 0;
      position: sticky;
      top: 57px;
      height: calc(100vh - 57px);
      overflow-y: auto;
    }

    .sidebar-section { margin-bottom: 8px; }

    .sidebar-purpose {
      padding: 6px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sidebar-purpose:hover { color: var(--text); }

    .sidebar-purpose .chevron {
      transition: transform 0.2s;
      font-style: normal;
    }

    .sidebar-purpose.collapsed .chevron { transform: rotate(-90deg); }

    .sidebar-type-group { padding-left: 12px; }

    .sidebar-type-label {
      padding: 4px 16px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .sidebar-item {
      padding: 5px 16px 5px 28px;
      cursor: pointer;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--muted);
      font-size: 13px;
      transition: background 0.1s, color 0.1s;
    }

    .sidebar-item:hover { background: var(--surface); color: var(--text); }
    .sidebar-item.active { background: var(--surface); color: var(--accent); }

    /* ── Main ────────────────────────────────────────────── */
    main {
      padding: 0;
      overflow: hidden;
    }

    /* ── Search + filters ────────────────────────────────── */
    .toolbar {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
    }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    input[type="search"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 7px 12px 7px 34px;
      font-size: 13px;
      outline: none;
    }

    input[type="search"]:focus { border-color: var(--accent); }
    input[type="search"]::placeholder { color: var(--muted); }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 600; }

    /* ── Card grid ───────────────────────────────────────── */
    .cards-wrap {
      padding: 24px;
      overflow-y: auto;
      height: calc(100vh - 57px - 57px);
    }

    .purpose-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .purpose-heading {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0;
    }

    .purpose-header:not(:first-child) { margin-top: 32px; }

    .purpose-jbang-btn {
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }

    .purpose-jbang-btn:hover { border-color: var(--accent); color: var(--accent); }
    .purpose-jbang-btn.copied { border-color: #3fb950; color: #3fb950; }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      margin-bottom: 8px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card:hover { border-color: var(--accent); transform: translateY(-1px); }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .card-icon { font-size: 18px; line-height: 1; flex-shrink: 0; }

    .card-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }

    .card-path {
      font-size: 11px;
      color: var(--muted);
      font-family: "SFMono-Regular", Consolas, monospace;
      word-break: break-all;
    }

    .card-footer { display: flex; align-items: center; gap: 6px; margin-top: 4px; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      text-transform: capitalize;
    }

    .badge-agents     { background: rgba(31,111,235,0.2);  color: #79c0ff; }
    .badge-skills     { background: rgba(56,139,253,0.2);  color: #a5d6ff; }
    .badge-prompts    { background: rgba(63,185,80,0.2);   color: #56d364; }
    .badge-instructions { background: rgba(210,153,34,0.2); color: #e3b341; }
    .badge-bundle     { background: rgba(163,113,247,0.2); color: #d2a8ff; }

    .card-description {
      color: var(--muted);
      font-size: 13px;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .card-badges {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .card-jbang-btn {
      margin-left: auto;
      padding: 4px 8px;
    }

    /* ── Modal ───────────────────────────────────────────── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(1,4,9,0.8);
      z-index: 100;
      backdrop-filter: blur(2px);
    }

    .modal-backdrop.open { display: flex; align-items: flex-start; justify-content: center; padding: 40px 20px; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 860px;
      max-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-title { font-weight: 600; font-size: 15px; flex: 1; }

    .modal-meta { display: flex; gap: 8px; align-items: center; }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }

    .modal-close:hover { color: var(--text); }

    .modal-action-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .modal-action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .modal-action-btn.copied { border-color: #3fb950; color: #3fb950; }

    .modal-gh-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .modal-gh-link:hover { color: var(--accent); }

    .modal-body {
      padding: 24px;
      overflow-y: auto;
      flex: 1;
    }

    /* Markdown styles inside modal */
    .modal-body h1, .modal-body h2, .modal-body h3 {
      color: var(--text);
      margin: 0 0 12px;
      padding-bottom: 6px;
    }
    .modal-body h1 { font-size: 22px; border-bottom: 1px solid var(--border); }
    .modal-body h2 { font-size: 18px; border-bottom: 1px solid var(--border); margin-top: 24px; }
    .modal-body h3 { font-size: 15px; margin-top: 20px; }
    .modal-body p { margin-bottom: 12px; color: var(--text); }
    .modal-body ul, .modal-body ol { padding-left: 20px; margin-bottom: 12px; color: var(--text); }
    .modal-body li { margin-bottom: 4px; }
    .modal-body code {
      background: rgba(110,118,129,0.2);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
    }
    .modal-body pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      overflow-x: auto;
      margin-bottom: 14px;
    }
    .modal-body pre code { background: none; padding: 0; }
    .modal-body a { color: var(--accent); }
    .modal-body a:hover { color: var(--accent-hover); }
    .modal-body blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 14px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .modal-body hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .modal-body table { border-collapse: collapse; width: 100%; margin-bottom: 14px; }
    .modal-body th, .modal-body td { border: 1px solid var(--border); padding: 6px 12px; }
    .modal-body th { background: var(--bg); }
    .front-matter {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      padding: 14px;
      margin-bottom: 18px;
    }
    .front-matter-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 600;
    }
    .front-matter-grid {
      display: grid;
      grid-template-columns: minmax(100px, 180px) 1fr;
      gap: 8px 12px;
      align-items: start;
    }
    .front-matter-key {
      color: var(--muted);
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      word-break: break-word;
    }
    .front-matter-value {
      color: var(--text);
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .front-matter pre {
      margin: 0;
      max-height: 220px;
    }

    /* ── Empty / loading states ──────────────────────────── */
    .state-msg {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }

    .state-msg .emoji { font-size: 40px; display: block; margin-bottom: 12px; }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      aside { display: none; }
    }
  </style>
</head>
<body>

<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="24" height="24" rx="6" fill="#238636"/>
    <path d="M7 8h10M7 12h10M7 16h6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <a class="header-title" href="#">ai-toolkit</a>
  <span class="header-subtitle" id="subtitle">Loading…</span>
</header>

<div class="layout">
  <aside id="sidebar">
    <div class="state-msg"><div class="spinner"></div></div>
  </aside>

  <main>
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M10.68 11.74a6 6 0 1 1 1.06-1.06l3.04 3.03a.75.75 0 1 1-1.06 1.06zM1.5 6.5a4.5 4.5 0 1 0 9 0 4.5 4.5 0 0 0-9 0z"/>
        </svg>
        <input type="search" id="search" placeholder="Search bundles…" />
      </div>
      <div id="type-filters" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>

    <div class="cards-wrap" id="cards">
      <div class="state-msg"><div class="spinner"></div><br>Fetching resources…</div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <div class="modal-meta">
        <span class="badge" id="modal-badge"></span>
        <button class="modal-action-btn" id="modal-jbang-btn" title="Copy JBang install command">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
            <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/>
          </svg>
          <span>Copy JBang</span>
        </button>
        <button class="modal-action-btn" id="modal-copy-btn" title="Copy raw markdown">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
            <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/>
          </svg>
          <span>Copy raw</span>
        </button>
        <button class="modal-action-btn" id="modal-download-btn" title="Download markdown file">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
            <path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/><path d="M7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.969a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.78a.749.749 0 1 1 1.06-1.06z"/>
          </svg>
          Download
        </button>
        <a class="modal-gh-link" id="modal-gh-link" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          View on GitHub
        </a>
        <button class="modal-close" id="modal-close" aria-label="Close">×</button>
      </div>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="state-msg"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script>
  const OWNER = 'teggr';
  const REPO  = 'ai-toolkit';
  const BRANCH = 'main';

  const TYPE_ICONS = {
    bundle: '📦',
    agents: '🤖',
    skills: '⚡',
    prompts: '💬',
    instructions: '📋',
  };

  const KNOWN_TYPES = ['agents', 'skills', 'prompts', 'instructions'];

  // ── State ────────────────────────────────────────────────
  let allItems = [];   // { name, path, purpose, type, sha }
  let allBundles = []; // { name, description, purpose, path, type, types, resourceCount, markdown, frontMatter }
  let activeFilter = null;
  let activeSidebarItem = null;
  let searchQuery = '';

  // ── Fetch tree ───────────────────────────────────────────
  async function loadTree() {
    const url = `https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
    const data = await res.json();

    const markdownFiles = data.tree
      .filter(n => n.type === 'blob' && n.path.endsWith('.md'));

    // Filter to markdown files two levels deep: {purpose}/{type}/{file}.md
    const items = markdownFiles
      .filter(n => n.type === 'blob' && n.path.match(/^[^/]+\/[^/]+\/.+\.md$/))
      .map(n => {
        const parts = n.path.split('/');
        return {
          name: parts[parts.length - 1].replace(/\.md$/i, ''),
          path: n.path,
          purpose: parts[0],
          type: parts[1],
          sha: n.sha,
        };
      });

    const bundleReadmes = markdownFiles
      .filter(n => /^[^/]+\/README\.md$/i.test(n.path))
      .map(n => {
        const [purpose] = n.path.split('/');
        return { purpose, path: n.path, sha: n.sha };
      });

    const bundleReadmeByPurpose = new Map(bundleReadmes.map(bundle => [bundle.purpose, bundle]));
    const bundlePurposes = [...new Set([
      ...items.map(item => item.purpose),
      ...bundleReadmes.map(bundle => bundle.purpose),
    ])].sort();

    const bundles = await Promise.all(bundlePurposes.map(async purpose => {
      const readme = bundleReadmeByPurpose.get(purpose);
      let markdown = '';
      let frontMatter = null;

      if (readme) {
        markdown = await fetchMarkdown(readme.path);
        frontMatter = parseFrontMatter(markdown);
      }

      const resources = items.filter(item => item.purpose === purpose);
      const types = [...new Set(resources.map(item => item.type))]
        .sort((a, b) => KNOWN_TYPES.indexOf(a) - KNOWN_TYPES.indexOf(b));

      return {
        name: frontMatter?.data?.name || purpose,
        description: frontMatter?.data?.description || `${resources.length} resource${resources.length === 1 ? '' : 's'}`,
        purpose,
        path: readme?.path || `${purpose}/README.md`,
        type: 'bundle',
        sha: readme?.sha || null,
        types,
        resourceCount: resources.length,
        markdown,
        frontMatter,
      };
    }));

    allItems = items;
    allBundles = bundles;
    return { items, bundles };
  }

  // ── Render sidebar ───────────────────────────────────────
  function buildSidebar(items) {
    const byPurpose = groupBy(items, 'purpose');
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = '';

    for (const [purpose, purposeItems] of Object.entries(byPurpose)) {
      const byType = groupBy(purposeItems, 'type');

      const section = document.createElement('div');
      section.className = 'sidebar-section';

      const heading = document.createElement('div');
      heading.className = 'sidebar-purpose';
      const bundle = allBundles.find(item => item.purpose === purpose);
      heading.innerHTML = `<i class="chevron">▾</i> ${escapeHtml(bundle?.name || purpose)}`;
      heading.addEventListener('click', () => {
        heading.classList.toggle('collapsed');
        typeGroupWrap.style.display = heading.classList.contains('collapsed') ? 'none' : '';
      });
      section.appendChild(heading);

      const typeGroupWrap = document.createElement('div');

      for (const [type, typeItems] of Object.entries(byType)) {
        const typeGroup = document.createElement('div');
        typeGroup.className = 'sidebar-type-group';

        const typeLabel = document.createElement('div');
        typeLabel.className = 'sidebar-type-label';
        typeLabel.textContent = `${TYPE_ICONS[type] || '📄'} ${type}`;
        typeGroup.appendChild(typeLabel);

        for (const item of typeItems) {
          const el = document.createElement('div');
          el.className = 'sidebar-item';
          el.textContent = item.name;
          el.title = item.path;
          el.addEventListener('click', () => openItem(item));
          typeGroup.appendChild(el);
        }

        typeGroupWrap.appendChild(typeGroup);
      }

      section.appendChild(typeGroupWrap);
      sidebar.appendChild(section);
    }
  }

  // ── Render cards ─────────────────────────────────────────
  function renderCards() {
    const cards = document.getElementById('cards');
    let bundles = allBundles;

    if (activeFilter) bundles = bundles.filter(bundle => bundle.types.includes(activeFilter));
    if (searchQuery) bundles = bundles.filter(bundle =>
      bundle.name.toLowerCase().includes(searchQuery) ||
      bundle.description.toLowerCase().includes(searchQuery) ||
      bundle.purpose.toLowerCase().includes(searchQuery) ||
      bundle.types.some(type => type.toLowerCase().includes(searchQuery))
    );

    if (bundles.length === 0) {
      cards.innerHTML = `<div class="state-msg"><span class="emoji">🔍</span>No bundles match your search.</div>`;
      return;
    }

    cards.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'cards-grid';

    for (const bundle of bundles) {
      const resourceBadges = bundle.types
        .map(type => `<span class="badge badge-${type}">${escapeHtml(type)}</span>`)
        .join('');

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">
          <span class="card-icon">${TYPE_ICONS.bundle}</span>
          <span class="card-name">${escapeHtml(bundle.name)}</span>
        </div>
        <div class="card-description">${escapeHtml(bundle.description)}</div>
        <div class="card-path">${escapeHtml(bundle.path)}</div>
        <div class="card-footer">
          <div class="card-badges">
            <span class="badge badge-bundle">${bundle.resourceCount} resource${bundle.resourceCount === 1 ? '' : 's'}</span>
            ${resourceBadges}
          </div>
          <button class="purpose-jbang-btn card-jbang-btn" type="button" title="${escapeHtml(jbangCommandForBundle(bundle.purpose))}">
            <span>Copy JBang</span>
          </button>
        </div>
      `;

      card.addEventListener('click', () => openItem(bundle));

      const jbangBtn = card.querySelector('.card-jbang-btn');
      jbangBtn.addEventListener('click', async event => {
        event.stopPropagation();
        await navigator.clipboard.writeText(jbangCommandForBundle(bundle.purpose));
        jbangBtn.classList.add('copied');
        jbangBtn.querySelector('span').textContent = 'Copied!';
        setTimeout(() => {
          jbangBtn.classList.remove('copied');
          jbangBtn.querySelector('span').textContent = 'Copy JBang';
        }, 2000);
      });

      grid.appendChild(card);
    }

    cards.appendChild(grid);
  }

  // ── Render type filter pills ─────────────────────────────
  function buildFilters(items) {
    const types = [...new Set(items.map(i => i.type))].sort();
    const wrap = document.getElementById('type-filters');
    wrap.innerHTML = '';

    const allBtn = document.createElement('button');
    allBtn.className = `filter-btn ${activeFilter === null ? 'active' : ''}`;
    allBtn.textContent = 'All';
    allBtn.addEventListener('click', () => { activeFilter = null; refreshFilters(); renderCards(); });
    wrap.appendChild(allBtn);

    for (const type of types) {
      const btn = document.createElement('button');
      btn.className = `filter-btn ${activeFilter === type ? 'active' : ''}`;
      btn.textContent = `${TYPE_ICONS[type] || ''} ${type}`;
      btn.dataset.type = type;
      btn.addEventListener('click', () => { activeFilter = type; refreshFilters(); renderCards(); });
      wrap.appendChild(btn);
    }
  }

  function refreshFilters() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.type === activeFilter || (!btn.dataset.type && activeFilter === null));
    });
  }

  // ── Open item modal ──────────────────────────────────────
  async function openItem(item) {
    const backdrop  = document.getElementById('modal-backdrop');
    const title     = document.getElementById('modal-title');
    const badge     = document.getElementById('modal-badge');
    const link      = document.getElementById('modal-gh-link');
    const body      = document.getElementById('modal-body');
    const copyBtn   = document.getElementById('modal-copy-btn');
    const dlBtn     = document.getElementById('modal-download-btn');
    const jbangBtn  = document.getElementById('modal-jbang-btn');

    title.textContent = item.name;
    badge.textContent = item.type;
    badge.className   = `badge badge-${item.type}`;
    link.href = `https://github.com/${OWNER}/${REPO}/blob/${BRANCH}/${item.path}`;
    body.innerHTML = `<div class="state-msg"><div class="spinner"></div></div>`;
    copyBtn.disabled  = true;
    dlBtn.disabled    = true;

    jbangBtn.onclick = async () => {
      await navigator.clipboard.writeText(jbangCommand(item));
      jbangBtn.classList.add('copied');
      jbangBtn.querySelector('span').textContent = 'Copied!';
      setTimeout(() => {
        jbangBtn.classList.remove('copied');
        jbangBtn.querySelector('span').textContent = 'Copy JBang';
      }, 2000);
    };

    backdrop.classList.add('open');
    document.body.style.overflow = 'hidden';

    try {
      const md = item.markdown || await fetchMarkdown(item.path);
      const frontMatter = item.frontMatter || parseFrontMatter(md);
      const markdownBody = frontMatter ? frontMatter.content : md;
      body.innerHTML = `${renderFrontMatter(frontMatter)}${marked.parse(markdownBody)}`;

      const filename = item.path.split('/').pop();

      copyBtn.disabled = false;
      copyBtn.onclick = async () => {
        await navigator.clipboard.writeText(md);
        copyBtn.classList.add('copied');
        copyBtn.querySelector('span').textContent = 'Copied!';
        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.querySelector('span').textContent = 'Copy raw';
        }, 2000);
      };

      dlBtn.disabled = false;
      dlBtn.onclick = () => {
        const blob = new Blob([md], { type: 'text/markdown' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      };
    } catch (e) {
      body.innerHTML = `<div class="state-msg"><span class="emoji">⚠️</span>Failed to load content.</div>`;
    }
  }

  // ── Close modal ──────────────────────────────────────────
  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── Search ───────────────────────────────────────────────
  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase().trim();
    renderCards();
  });

  // ── Helpers ──────────────────────────────────────────────
  function jbangCommandForBundle(bundle) {
    return `jbang https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/AiToolkit.java install ${bundle}`;
  }

  function jbangCommand(item) {
    return jbangCommandForBundle(item.purpose);
  }

  async function fetchMarkdown(path) {
    const rawUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${path}`;
    const res = await fetch(rawUrl);
    if (!res.ok) throw new Error(`Failed to fetch ${path}: ${res.status}`);
    return res.text();
  }

  function groupBy(arr, key) {
    return arr.reduce((acc, item) => {
      (acc[item[key]] = acc[item[key]] || []).push(item);
      return acc;
    }, {});
  }

  function parseFrontMatter(markdown) {
    const match = markdown.match(/^---\s*\r?\n([\s\S]*?)\r?\n---\s*(?:\r?\n|$)/);
    if (!match) return null;

    const raw = match[1];
    const content = markdown.slice(match[0].length);
    const entries = raw
      .split(/\r?\n/)
      .map(line => line.trim())
      .filter(line => line && !line.startsWith('#') && /^[A-Za-z0-9_.-]+\s*:/.test(line))
      .map(line => {
        const idx = line.indexOf(':');
        return {
          key: line.slice(0, idx).trim(),
          value: line.slice(idx + 1).trim() || '(empty)',
        };
      });

    return {
      raw,
      content,
      entries,
      data: Object.fromEntries(entries.map(({ key, value }) => [key, value])),
    };
  }

  function escapeHtml(value) {
    return value
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function renderFrontMatter(frontMatter) {
    if (!frontMatter) return '';

    if (frontMatter.entries.length === 0) {
      return `
        <section class="front-matter">
          <div class="front-matter-title">YAML Front Matter</div>
          <pre><code>${escapeHtml(frontMatter.raw)}</code></pre>
        </section>
      `;
    }

    const rows = frontMatter.entries
      .map(({ key, value }) => `
        <div class="front-matter-key">${escapeHtml(key)}</div>
        <div class="front-matter-value">${escapeHtml(value)}</div>
      `)
      .join('');

    return `
      <section class="front-matter">
        <div class="front-matter-title">YAML Front Matter</div>
        <div class="front-matter-grid">${rows}</div>
      </section>
    `;
  }

  // ── Boot ─────────────────────────────────────────────────
  (async () => {
    try {
      const { items, bundles } = await loadTree();
      const count = items.length;

      document.getElementById('subtitle').textContent =
        `${bundles.length} bundle${bundles.length !== 1 ? 's' : ''} · ${count} resource${count !== 1 ? 's' : ''} · teggr/ai-toolkit`;

      buildSidebar(items);
      buildFilters(items);
      renderCards();
    } catch (err) {
      document.getElementById('cards').innerHTML =
        `<div class="state-msg"><span class="emoji">⚠️</span>${err.message}</div>`;
      document.getElementById('sidebar').innerHTML =
        `<div class="state-msg" style="font-size:12px;padding:20px">${err.message}</div>`;
      document.getElementById('subtitle').textContent = 'Error loading data';
    }
  })();
</script>
</body>
</html>
